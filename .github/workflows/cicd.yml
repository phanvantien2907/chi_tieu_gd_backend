name: CI / CD Pipeline

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

# ─────────────────────────────────────────
# Biến dùng chung
# ─────────────────────────────────────────
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ═════════════════════════════════════════
# JOB 1 — CI: Chạy trên CẢ HAI nhánh
# ═════════════════════════════════════════
jobs:
  ci:
    name: CI — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build (type-check)
        run: pnpm run build

      # Build Docker image để đảm bảo Dockerfile không lỗi
      - name: Docker build smoke test
        run: |
          docker build \
            --target runner \
            --tag chi-tieu-gd-api:ci-test \
            .

  # ═════════════════════════════════════════
  # JOB 2 — CD: CHỈ chạy khi push lên main
  # ═════════════════════════════════════════
  deploy:
    name: CD — Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci                          # Phải pass CI trước
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── SSH vào EC2 và deploy ──────────────────────────────────
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e  # Dừng ngay nếu có lỗi

            APP_DIR="${{ secrets.APP_DIR }}"
            REPO_URL="git@github.com:${{ github.repository }}.git"

            echo "▶ Chuẩn bị thư mục ứng dụng..."
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo "▶ Pull code mới nhất từ nhánh main..."
            git fetch origin main
            git reset --hard origin/dev

            echo "▶ Ghi file .env từ secret..."
            cat > .env << 'ENVEOF'
            ${{ secrets.ENV_FILE_PRODUCTION }}
            ENVEOF

            echo "▶ Pull image base mới nhất..."
            docker compose pull postgres nginx 2>/dev/null || true

            echo "▶ Build và khởi động lại các service..."
            docker compose up -d --build --remove-orphans

            echo "▶ Dọn dẹp image cũ..."
            docker image prune -f

            echo "▶ Kiểm tra trạng thái..."
            docker compose ps

            echo "✅ Deploy thành công!"